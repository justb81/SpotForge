name: CI

# Format/Lint/Typecheck/Test/Build über das gesamte Monorepo.
# Dient zugleich als Gate vor dem Coolify-Deploy (Backend) – Coolify kann so
# konfiguriert werden, dass es erst nach grünem CI deployt.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Veraltete Läufe desselben Refs abbrechen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres für die Backend-Integrationstests (RLS-Mandantentrennung, #18).
    # Admin/Superuser-Rolle; das Backend provisioniert daraus die Nicht-
    # Superuser-App-Rolle (ADR 0012). Ohne TEST_DATABASE_URL würden diese Tests
    # übersprungen – im CI sollen sie laufen.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: sf_admin
          POSTGRES_PASSWORD: sf_admin
          POSTGRES_DB: spotforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sf_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turborepo-Cache zwischen Läufen wiederverwenden.
      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate categories
        run: pnpm validate-categories

      - name: Validate variants
        run: pnpm validate-variants

      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgresql://sf_admin:sf_admin@localhost:5432/spotforge_test

      - name: Build
        run: pnpm build
