name: CI

# Format/Lint/Typecheck/Test/Build über das gesamte Monorepo.
# Dient zugleich als Gate vor dem Coolify-Deploy (Backend) – Coolify kann so
# konfiguriert werden, dass es erst nach grünem CI deployt.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Veraltete Läufe desselben Refs abbrechen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turborepo-Cache zwischen Läufen wiederverwenden.
      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
