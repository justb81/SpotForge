name: PoC Android APK

# Baut – ohne Expo-Cloud/EAS – ein eigenständiges, installierbares Android-APK
# direkt im CI-Runner und stellt es als herunterladbares Workflow-Artefakt bereit.
# Gedacht zum schnellen Testen auf einem echten Gerät: APK aus dem Run laden,
# sideloaden, offline starten.
#
# Trigger:
#  - **workflow_dispatch:** auf JEDEM Branch manuell auslösbar – in der Actions-UI
#    den Branch wählen oder per API mit beliebigem `ref` starten; `variant` wählbar.
#  - **pull_request:** automatisch für JEDEN PR, der einen den mobilen Build
#    betreffenden Pfad ändert (siehe `paths`) – baut die Variante `cars`. Der Build
#    ist schwer (Modelle + Gradle), daher bricht `concurrency` überholte Läufe je
#    PR ab; Änderungen ohne Mobile-Bezug lösen ihn nicht aus.
#
# JS-Bundle ist eingebettet (kein Metro-Dev-Server nötig), alle nativen Module
# (ExecuTorch, Kamera) sind enthalten. Release wird mit dem Debug-Keystore
# signiert – genügt zum Sideloaden, kein Store-Build (dafür EAS via mobile-build.yml).
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "App-Variante (Ordner unter variants/)"
        type: string
        default: cars
  pull_request:
    # Nur Pfade, die ins APK einfließen: der Mobile-Host, alle gebündelten Pakete,
    # die Varianten-/Branding-Bündel, die Modell-Beschaffung und dieser Workflow.
    paths:
      - "apps/mobile/**"
      - "packages/app-shell/**"
      - "packages/ui/**"
      - "packages/ai-engine/**"
      - "packages/app-config/**"
      - "packages/game-core/**"
      - "packages/api-client/**"
      - "variants/**"
      - "tools/fetch-models/**"
      - "data/models/**"
      - ".github/workflows/poc-android-apk.yml"

# Je PR (bzw. Branch beim manuellen Lauf) immer nur ein Build; ein neuer Push
# bricht den vorherigen ab – spart Runner-Zeit beim teuren APK-Build.
concurrency:
  group: poc-apk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VARIANT: ${{ github.event.inputs.variant || 'cars' }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bezieht die gebündelten ExecuTorch-Modelle (.pte). Muss VOR dem Bundle
      # laufen, da App.tsx sie per statischem require einbindet (nicht im Git).
      - name: Fetch ML models
        run: pnpm fetch-models

      # Erzeugt das native android/-Projekt aus app.config/Plugins. --no-install,
      # weil JS-Abhängigkeiten bereits via pnpm installiert sind.
      # Schlägt pnpm-Autolinking für native Module fehl → `node-linker=hoisted`
      # in root .npmrc als Fallback setzen.
      - name: Expo prebuild (android)
        working-directory: apps/mobile
        env:
          APP_VARIANT: ${{ env.VARIANT }}
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Gradle assembleRelease
        working-directory: apps/mobile/android
        env:
          APP_VARIANT: ${{ env.VARIANT }}
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.daemon.performance.disable-logging=true

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.VARIANT }}-poc-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
